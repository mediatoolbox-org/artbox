name: smoke-test
output: /tmp/artbox-smoke/out
cache-dir: smoke-cache
audio:
  engine: edge-tts
  defaults:
    language: english
    gender: female
    volume: 1.0
    pitch: 1.0
    speed: 1.0
video:
  engine: ffmpeg
source:
  type: image
slides:
  defaults:
    transitions:
      pause-after: 1
  items:
    - slide: 1
      background:
        path: slide1.png
      audio:
        text: "smoke test audio"
