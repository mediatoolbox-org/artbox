groups:
  artbox:
    targets:
      all:
        help: Run all smoke tests
        dependencies:
          - target: artbox.render-image
          - target: artbox.speech-from-text
          - target: artbox.init-project

      render-image:
        help: Test the 'artbox render' command with an image-based project
        shell: bash
        run: |
          mkdir -p /tmp/artbox-smoke/out
          cp tests/smoke/test_project.yaml /tmp/artbox-smoke/test_project.yaml

          # Create a dummy image
          python -c "from PIL import Image; Image.new('RGB', (100, 100)).save('/tmp/artbox-smoke/slide1.png')"

          artbox render --project /tmp/artbox-smoke/test_project.yaml

          # Verify output
          if [ ! -f "/tmp/artbox-smoke/out/smoke-test.mp4" ]; then
            echo "Error: Output video not generated"
            exit 1
          fi

          # Verify cache-dir output
          if [ ! -d "/tmp/artbox-smoke/smoke-cache" ]; then
            echo "Error: smoke-cache directory not generated"
            exit 1
          fi

          # Verify that an intermediary artifact was copied
          CACHE_FILES=$(ls /tmp/artbox-smoke/smoke-cache | wc -l)
          if [ "$CACHE_FILES" -eq 0 ]; then
            echo "Error: no cached artifacts found in cache-dir"
            exit 1
          fi

          echo "Render test passed"

      speech-from-text:
        help: Test the 'artbox speech from-text' command
        shell: bash
        run: |
          mkdir -p /tmp/artbox-smoke
          echo "hello world" > /tmp/artbox-smoke/text.txt
          artbox speech from-text --title "smoke" --input-path /tmp/artbox-smoke/text.txt --output-path /tmp/artbox-smoke/speech.mp3

          if [ ! -f "/tmp/artbox-smoke/speech.mp3" ]; then
            echo "Error: Speech file not generated"
            exit 1
          fi
          echo "Speech test passed"

      init-project:
        help: Test the 'artbox init' command
        shell: bash
        run: |
          mkdir -p /tmp/artbox-smoke
          touch /tmp/artbox-smoke/test.pdf

          # Create a dummy PPTX with python-pptx
          CMD="from pptx import Presentation\n"
          CMD="${CMD}prs = Presentation()\n"
          CMD="${CMD}slide = prs.slides.add_slide(prs.slide_layouts[0])\n"
          CMD="${CMD}text_frame = slide.notes_slide.notes_text_frame\n"
          CMD="${CMD}text_frame.text = 'Smoke test speaker note.'\n"
          CMD="${CMD}prs.save('/tmp/artbox-smoke/test.pptx')\n"

          echo -e "$CMD" | python

          artbox init --source-pdf /tmp/artbox-smoke/test.pdf --notes-pptx /tmp/artbox-smoke/test.pptx --output /tmp/artbox-smoke/test_init.yaml

          if [ ! -f "/tmp/artbox-smoke/test_init.yaml" ]; then
            echo "Error: YAML project file not generated"
            exit 1
          fi

          grep "Smoke test speaker note" /tmp/artbox-smoke/test_init.yaml > /dev/null
          if [ $? -ne 0 ]; then
            echo "Error: Speaker notes not correctly extracted to YAML"
            exit 1
          fi

          echo "Init test passed"
